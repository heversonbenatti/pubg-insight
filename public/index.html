<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG INSIGHT</title>
    <link rel="icon" href="/icons/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>pubg<span class="insight">insight</span></h1>
        <form id="player-form">
            <div class="form-row">
                <input type="text" id="player-name" placeholder="Enter player name" required>
            </div>
            <div class="form-row">
                <select id="season-select"></select>
                <button id="search-button" type="submit">Search</button>
            </div>
        </form>

        <div id="player-stats" style="display: none;">
            <div class="player-info">
                <img src="/images/steam-logo-transparent.png" alt="Steam Icon" class="player-icon">
                <h2 id="player-name-display"></h2>
            </div>

            <div class="w3-bar w3-black tab-bar">
                <button class="w3-bar-item w3-button tablink" data-tab="soloFpp">SOLO FPP</button>
                <button class="w3-bar-item w3-button tablink" data-tab="duoFpp">DUO FPP</button>
                <button class="w3-bar-item w3-button tablink" data-tab="squadFpp">SQUAD FPP</button>
                <button class="w3-bar-item w3-button tablink" data-tab="soloTpp">SOLO TPP</button>
                <button class="w3-bar-item w3-button tablink" data-tab="duoTpp">DUO TPP</button>
                <button class="w3-bar-item w3-button tablink" data-tab="squadTpp">SQUAD TPP</button>
            </div>

            <div id="stats-container" class="stats-grid"></div>
        </div>

        <div id="matches-container" style="display: none;">
            <div id="match-list" class="match-list">
                <h2>Last Matches</h2>
            </div>
        </div>
    </div>

    <!-- Apenas scripts.js como entry point — ele importa modal.js e replay2d.js internamente -->
    <script type="module" src="scripts.js"></script>
</body>

</html>
